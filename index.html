<style>

.btn-print{background:linear-gradient(135deg,#1e3a5f,#2563eb);color:#fff;transition:all .2s}

.tbl-row{transition:background .12s}.tbl-row:hover{background:rgba(37,99,235,.04)}

.modal-bg{backdrop-filter:blur(4px)}

.nomor-auto{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:12px;padding:10px 16px;font-family:'Courier New',monospace;font-size:14px;font-weight:700;letter-spacing:.5px;color:#166534;display:flex;align-items:center;gap:10px}

.tbl-scroll thead th::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,#c49a2a,#ecc960 50%,#c49a2a);opacity:.7}
.flt-active{background:#0c1424!important;color:#dab43e!important;border-color:#c49a2a!important}

.hero-bg::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle,rgba(255,255,255,0.035) 1px,transparent 1px);background-size:22px 22px;pointer-events:none}

.glass{background:rgba(255,255,255,0.06);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.09);border-radius:16px;transition:all .25s}
.glass:hover{background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.15);transform:translateY(-2px)}
.glass .g-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}

.stat-num{font-size:1.75rem;font-weight:800;line-height:1;letter-spacing:-.02em}
.hero-logo-ring{width:100px;height:100px;border-radius:24px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;position:relative}
.hero-logo-ring img{width:72px;height:auto;filter:drop-shadow(0 0 12px rgba(196,154,42,0.2))}
.hero-logo-ring::after{content:'';position:absolute;inset:-6px;border-radius:28px;border:1px solid rgba(196,154,42,0.12);animation:ringPulse 3s ease-in-out infinite}

.empty-hero{background:linear-gradient(135deg,#03194f,#0f1f3d);border-radius:24px;position:relative;overflow:hidden}

.toggle-switch{position:relative;width:30px;height:16px;cursor:pointer;display:inline-block;flex-shrink:0}
.toggle-switch input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;inset:0;background:#d1d5db;border-radius:16px;transition:all .2s}
.toggle-slider::before{content:'';position:absolute;width:12px;height:12px;border-radius:50%;background:#fff;top:2px;left:2px;transition:all .2s;box-shadow:0 1px 3px rgba(0,0,0,.15)}
.toggle-switch input:checked+.toggle-slider{background:#16a34a}

.status-aktif{display:inline-flex;align-items:center;gap:2px;padding:0 4px;border-radius:4px;font-size:9px;font-weight:600;background:#f0fdf4;color:#166534;white-space:nowrap;line-height:16px}
.status-nonaktif{display:inline-flex;align-items:center;gap:2px;padding:0 4px;border-radius:4px;font-size:9px;font-weight:600;background:#e8edf3;color:#64748b;white-space:nowrap;line-height:16px}
.status-aktif i,.status-nonaktif i{font-size:7px}
.ctbl thead th{padding:4px 10px;font-size:11px}
.ctbl tbody td{padding:3px 10px;font-size:12px;line-height:1.35}
.ctbl-compact thead th{padding:9px 10px;font-size:12px;letter-spacing:.04em}
.ctbl-compact tbody td{padding:2px 8px;font-size:12.5px;line-height:1.3}
.ctbl-compact .st-cell{vertical-align:middle}
.pag-btn{width:28px;height:28px;border-radius:6px;display:inline-flex;align-items:center;justify-content:center;font-size:11px;cursor:pointer;border:none;transition:all .15s}

.pag-btn.active{background:#0c1424;color:#dab43e;font-weight:700}
.pag-dots{width:28px;height:28px;display:inline-flex;align-items:center;justify-content:center;font-size:11px;color:#9ca3af;letter-spacing:1px}
.nomor-kontrak-badge{display:inline-flex;align-items:center;gap:0;background:linear-gradient(135deg,#0c1424,#1e2d4a);color:#dab43e;padding:2px 8px;border-radius:5px;font-family:'Courier New',monospace;font-size:10px;font-weight:700;letter-spacing:.3px;white-space:nowrap;border:1px solid rgba(196,154,42,0.2);line-height:18px}
.nomor-kontrak-badge .nk-slash{color:rgba(212,180,62,0.45);margin:0 1px}

.fg-hint{font-size:10px;color:#94a3b8;margin-top:2px}
.fg-hint i{margin-right:3px}
.f-section{border:1px solid #e2e8f0;border-radius:10px;overflow:hidden}
.f-section-hd{display:flex;align-items:center;gap:6px;padding:7px 12px;background:linear-gradient(135deg,#f8fafc,#f1f5f9);border-bottom:1px solid #e2e8f0;font-size:12px;font-weight:700;color:#334155;letter-spacing:.02em}
.f-section-hd i{font-size:11px;width:18px;height:18px;border-radius:5px;display:inline-flex;align-items:center;justify-content:center}
.f-section-hd .shd-gold{background:linear-gradient(135deg,#fef3c7,#fde68a);color:#92400e}
.f-section-hd .shd-blue{background:linear-gradient(135deg,#dbeafe,#bfdbfe);color:#1e40af}
.f-section-hd .shd-green{background:linear-gradient(135deg,#dcfce7,#bbf7d0);color:#166534}
.f-section-hd .shd-purple{background:linear-gradient(135deg,#f3e8ff,#e9d5ff);color:#6b21a8}
.f-section-hd .shd-orange{background:linear-gradient(135deg,#ffedd5,#fed7aa);color:#c2410c}
.f-section-bd{padding:10px 12px}
.f-row{display:grid;gap:8px}
.f-row-2{grid-template-columns:1fr 1fr}
.f-row-3{grid-template-columns:1fr 1fr 1fr}

.nk-compact{display:flex;align-items:center;gap:8px;background:linear-gradient(135deg,#f0fdf4,#ecfdf5);border:1.5px solid #86efac;border-radius:8px;padding:6px 12px;font-family:'Courier New',monospace;font-size:12.5px;font-weight:700;color:#166534;letter-spacing:.3px;transition:all .2s}
.nk-compact.dup-warn{background:linear-gradient(135deg,#fef2f2,#fee2e2);border-color:#fca5a5;color:#dc2626}

.nk-compact i{font-size:10px;flex-shrink:0}
.nk-compact .nk-label{font-family:'Outfit',sans-serif;font-size:9px;font-weight:600;color:#15803d;text-transform:uppercase;letter-spacing:.5px;line-height:1}
.nk-compact.locked .nk-label{color:#64748b}
.nk-compact.dup-warn .nk-label{color:#991b1b}
.tgl-chip{display:inline-flex;align-items:center;gap:3px;font-size:10.5px;font-weight:600;padding:3px 8px;border-radius:6px}
.tgl-chip.from-global{background:#eff6ff;color:#2563eb}
.tgl-chip.from-custom{background:#fef3c7;color:#d97706}
.tgl-chip.from-calc{background:#f0fdf4;color:#16a34a}
.dup-warn-bar{display:flex;align-items:center;gap:6px;padding:6px 10px;background:#fef2f2;border:1px solid #fecaca;border-radius:6px;font-size:10.5px;color:#dc2626;animation:dupPulse 1.5s ease-in-out infinite}
@keyframes dupPulse{0%,100%{border-color:#fecaca}50%{border-color:#ef4444}}
.sel-cb{width:16px;height:16px;border-radius:4px;cursor:pointer;accent-color:#0a36c4;flex-shrink:0}
.tbl-row.row-sel{background:rgba(10,54,196,0.06)!important}
.floating-bar{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:linear-gradient(135deg,#0c1424,#1a2940);color:#fff;border-radius:16px;padding:10px 20px;display:flex;align-items:center;gap:12px;box-shadow:0 8px 32px rgba(0,0,0,0.35),0 0 0 1px rgba(196,154,42,0.15);z-index:40;transition:transform .35s cubic-bezier(.22,1,.36,1),opacity .3s;opacity:0;pointer-events:none;white-space:nowrap}
.floating-bar.show{transform:translateX(-50%) translateY(0);opacity:1;pointer-events:auto}
.floating-bar .fb-count{font-size:13px;font-weight:700;color:#dab43e}
.floating-bar .fb-label{font-size:12px;color:rgba(255,255,255,0.6)}
.floating-bar .fb-btn{display:inline-flex;align-items:center;gap:6px;padding:7px 16px;border-radius:10px;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:all .15s}
.floating-bar .fb-btn-print{background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff;box-shadow:0 2px 8px rgba(37,99,235,0.4)}
.floating-bar .fb-btn-print:hover{background:linear-gradient(135deg,#1d4ed8,#1e40af);transform:translateY(-1px)}
.floating-bar .fb-btn-cancel{background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.7);border:1px solid rgba(255,255,255,0.15)}
.floating-bar .fb-btn-cancel:hover{background:rgba(255,255,255,0.15)}

.sel-toggle-btn{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:10px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid #c9d1dc;color:#475569;background:#fff;transition:all .2s}
.sel-toggle-btn:hover{border-color:#0a36c4;color:#0a36c4;background:#eff6ff}
.sel-toggle-btn.active{background:#0c1424;color:#dab43e;border-color:#c49a2a}
.sel-toggle-btn.active:hover{background:#152036}
.jenis-chip{display:inline-flex;align-items:center;gap:3px;padding:1px 7px;border-radius:5px;font-size:9.5px;font-weight:700;letter-spacing:.02em;white-space:nowrap}
.jenis-chip.ppl{background:#dbeafe;color:#1d4ed8;border:1px solid #93c5fd}
.jenis-chip.ppl-ub{background:#fef3c7;color:#92400e;border:1px solid #fde68a}
.snap-badge{display:inline-flex;align-items:center;gap:3px;font-size:9.5px;font-weight:600;padding:1px 6px;border-radius:4px;background:#f0fdf4;color:#166534;border:1px solid #bbf7d0;white-space:nowrap}
.snap-badge i{font-size:8px}
.qs-step{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:12px;background:#fff;border:1px solid #e2e8f0;transition:all .2s;cursor:pointer}
.qs-step:hover{border-color:#c49a2a;box-shadow:0 2px 12px rgba(196,154,42,.12);transform:translateY(-1px)}
.qs-step .qs-num{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0}
.qs-step.done .qs-num{background:#f0fdf4;color:#16a34a;border:1px solid #bbf7d0}
.qs-step.pending .qs-num{background:#fef3c7;color:#d97706;border:1px solid #fde68a}
.qs-step .qs-text{flex:1}
.qs-step .qs-title{font-size:12px;font-weight:700;color:#1e293b}
.qs-step .qs-desc{font-size:10px;color:#94a3b8;margin-top:1px}
.qs-step .qs-icon{font-size:11px;color:#c49a2a}
@keyframes qsBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
.qs-arrow{animation:qsBounce 1.5s ease-in-out infinite;display:inline-block}
.ss-wrap{position:relative}
.ss-trigger{display:flex;align-items:center;justify-content:space-between;padding:5px 8px;border-radius:6px;border:1.5px solid #e2e8f0;font-size:12px;cursor:pointer;background:#fff;transition:all .15s;min-height:30px;gap:4px;user-select:none}
.ss-trigger:hover{border-color:#cbd5e1}
.ss-trigger.open{border-color:#c49a2a;box-shadow:0 0 0 3px rgba(196,154,42,.1)}
.ss-display{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#0f172a;line-height:1.3}
.ss-display.ph{color:#cbd5e1;font-style:italic}
.ss-arrow{flex-shrink:0;color:#94a3b8;font-size:9px;transition:transform .2s}

.ss-panel{position:fixed;background:#fff;border:1.5px solid #e2e8f0;border-radius:10px;box-shadow:0 10px 32px rgba(0,0,0,.14),0 2px 8px rgba(0,0,0,.06);z-index:99999;display:none;overflow:hidden;min-width:180px}
.ss-panel.show{display:block;animation:ssIn .15s ease}

.ss-search{padding:6px 8px;border-bottom:1px solid #f1f5f9;position:relative}

.ss-search input:focus{border-color:#c49a2a;background:#fff}
.ss-search>i{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#94a3b8;font-size:9px;pointer-events:none}
.ss-list{max-height:200px;overflow-y:auto;padding:3px}

.ss-opt.active{background:#0c1424;color:#dab43e;font-weight:600}

.ss-nores{padding:12px 14px;text-align:center;color:#94a3b8;font-size:11px}
.ss-nores i{display:block;font-size:16px;margin-bottom:3px;opacity:.4}

.nilai-match.mismatch{background:#fef2f2;color:#dc2626;border:1px solid #fecaca}
.nilai-match.neutral{background:#f8fafc;color:#64748b;border:1px solid #e2e8f0}

<script>

const BL=['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];

const S={v:'dashboard',set:{ppkNama:'',ppkNip:'',bpsNama:'Badan Pusat Statistik Kota Pekanbaru',bpsAlamat:'Jl. Rawa Indah No. 2',kota:'Pekanbaru',honorMaks:0,tglTandaTangan:'',tglSelesai:''},mitra:[],dbMitra:[]};

function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=String(s);return d.innerHTML}
function fRp(n){if(!n&&n!==0)return'-';return'Rp '+Number(n).toLocaleString('id-ID')}
function fTgl(d){if(!d)return'-';return new Date(d).toLocaleDateString('id-ID',{day:'numeric',month:'long',year:'numeric'})}
function fTglShort(d){if(!d)return'-';return new Date(d).toLocaleDateString('id-ID',{day:'numeric',month:'short',year:'numeric'})}
function terbilang(n){if(n===0)return'nol';const s=['','satu','dua','tiga','empat','lima','enam','tujuh','delapan','sembilan'],b=['','ribu','juta','miliar','triliun'],bl=['sebelas','dua belas','tiga belas','empat belas','lima belas','enam belas','tujuh belas','delapan belas','sembilan belas'];let r='',neg=false;if(n<0){neg=true;n=-n}n=Math.floor(n);let i=0;while(n>0){let c=n%1000;n=Math.floor(n/1000);let cs='',cO=c;if(c>=100){const h=Math.floor(c/100);cs+=(h===1?'seratus':s[h]+' ratus')+' ';c%=100}if(c>=11&&c<=19)cs+=bl[c-11]+' ';else if(c===10)cs+='sepuluh ';else if(c>=20){cs+=s[Math.floor(c/10)]+' puluh ';c%=10;if(c>0)cs+=s[c]+' '}else if(c>0)cs+=s[c]+' ';if(cO===1&&i===1&&n===0)cs='seribu ';else if(cO>0)cs+=b[i]+' ';r=cs+r;i++}return(neg?'minus ':'')+r.trim()}
function updBadges(){const b1=$('bdgDb'),b3=$('bdgKon');if(S.dbMitra.length){b1.textContent=S.dbMitra.length;b1.classList.remove('hidden')}else b1.classList.add('hidden');if(S.mitra.length){b3.textContent=S.mitra.length;b3.classList.remove('hidden')}else b3.classList.add('hidden')}
function getMitraTglTT(m){return m.tglTandaTangan||S.set.tglTandaTangan||''}
function getNextSeq(tglTT,excludeId){if(!tglTT)return 1;const existing=S.mitra.filter(m=>{if(excludeId&&m.id===excludeId)return false;return getMitraTglTT(m)===tglTT&&m.nomorKontrak});const usedSeqs=new Set();existing.forEach(m=>{const parts=m.nomorKontrak.split('/');if(parts.length===4){const seq=parseInt(parts[0].substring(4));if(seq>0)usedSeqs.add(seq)}});let seq=1;while(usedSeqs.has(seq))seq++;return seq}
function pad2(n){return String(n).padStart(2,'0')}
function getNomorPreview(formTT,excludeId){const tglTT=formTT||S.set.tglTandaTangan||'';if(!tglTT)return{nomor:'-',isDup:false,conflictWith:''};const d=new Date(tglTT),dd=pad2(d.getDate()),mm=pad2(d.getMonth()+1),yyyy=d.getFullYear();const seq=getNextSeq(tglTT,excludeId);const nomor=mm+dd+String(seq).padStart(3,'0')+'/PPK/SE2026/'+yyyy;const conflict=S.mitra.find(m=>m.id!==excludeId&&m.nomorKontrak===nomor);return{nomor,isDup:!!conflict,conflictWith:conflict?conflict.nama:''}}
function regenAllNomor(){const groups={};S.mitra.forEach(m=>{const ttd=getMitraTglTT(m);if(!ttd)return;const d=new Date(ttd);const key=pad2(d.getDate())+pad2(d.getMonth()+1)+d.getFullYear();if(!groups[key])groups[key]={mmdd:key.substring(0,4),yyyy:key.substring(4),items:[]};groups[key].items.push(m)});Object.values(groups).forEach(g=>{g.items.sort((a,b)=>new Date(a.createdAt||0)-new Date(b.createdAt||0));const usedNums=new Set();g.items.forEach(m=>{if(m.nomorKontrak){const parts=m.nomorKontrak.split('/');if(parts.length===4&&parts[0].startsWith(g.mmdd)){const seq=parseInt(parts[0].substring(4));if(seq>0)usedNums.add(seq)}}});g.items.forEach(m=>{if(!m.nomorKontrak||m.nomorKontrak.trim()===''){let seq=1;while(usedNums.has(seq))seq++;m.nomorKontrak=g.mmdd+String(seq).padStart(3,'0')+'/PPK/SE2026/'+g.yyyy;usedNums.add(seq)}})})}
function fixDuplicates(){const used=new Set();[...S.mitra].sort((a,b)=>new Date(a.createdAt||0)-new Date(b.createdAt||0)).forEach(m=>{if(!m.nomorKontrak)return;if(used.has(m.nomorKontrak)){const ttd=getMitraTglTT(m);if(!ttd)return;const d=new Date(ttd);const mmdd=pad2(d.getDate())+pad2(d.getMonth());const yyyy=d.getFullYear();let seq=1,newNomor;do{newNomor=mmdd+String(seq).padStart(3,'0')+'/PPK/SE2026/'+yyyy;seq++}while(used.has(newNomor));m.nomorKontrak=newNomor}used.add(m.nomorKontrak)})}
function findDuplicates(){const map=new Map(),dups=[];S.mitra.forEach(m=>{if(!m.nomorKontrak)return;if(map.has(m.nomorKontrak))dups.push({nomor:m.nomorKontrak,existing:map.get(m.nomorKontrak),duplicate:m});else map.set(m.nomorKontrak,m)});return dups}
function formatNomorBadge(nomor,isDup){if(!nomor)return'-';const parts=nomor.split('/');const cls=isDup?'nomor-kontrak-badge dup':'nomor-kontrak-badge';if(parts.length===4)return'<span class="'+cls+'" title="'+(isDup?'NOMOR DUPLIKAT!':'')+'">'+parts[0]+'<span class="nk-slash">/</span>'+parts[1]+'<span class="nk-slash">/</span>'+parts[2]+'<span class="nk-slash">/</span>'+parts[3]+(isDup?' <i class="fas fa-exclamation-triangle" style="font-size:9px"></i>':'')+'</span>';return'<span class="'+cls+'">'+nomor+'</span>'}
function toast(msg,type='success'){const ic={success:'fa-check-circle text-green-500',error:'fa-times-circle text-red-500',warning:'fa-exclamation-circle text-amber-500',info:'fa-info-circle text-blue-500'},bg={success:'border-green-200',error:'border-red-200',warning:'border-amber-200',info:'border-blue-200'};const el=document.createElement('div');el.className='toast-in pointer-events-auto flex items-center gap-3 bg-white border '+bg[type]+' rounded-xl shadow-lg px-4 py-3 min-w-[280px] max-w-[400px]';el.innerHTML='<i class="fas '+ic[type]+'"></i><span class="text-sm text-gray-700 flex-1">'+msg+'</span>';$('tC').appendChild(el);setTimeout(()=>{el.classList.replace('toast-in','toast-out');setTimeout(()=>el.remove(),250)},3000)}

function loadS(){try{const d=JSON.parse(localStorage.getItem('se2026App'));if(d){if(d.v)S.v=d.v;if(d.set)Object.assign(S.set,d.set);if(d.mitra)S.mitra=d.mitra;if(d.dbMitra)S.dbMitra=d.dbMitra}else S.dbMitra=getSampleDbMitra();S.dbMitra.forEach(m=>{if(m.aktif===undefined)m.aktif=true});regenAllNomor();if(S.mitra.length||S.dbMitra.length)$('svSt').textContent='@copyright_putu'}catch(e){if(!S.dbMitra.length)S.dbMitra=getSampleDbMitra()}}

function oM(t,h,showPrint,mid){$('mTi').innerHTML=t;$('mIn').innerHTML=h;if(showPrint&&mid){$('mPrintBtn').innerHTML='<button onclick="cM();setTimeout(function(){printK(\''+mid+'\')},150)" class="btn-print px-4 py-2.5 rounded-xl text-xs font-semibold flex items-center gap-2"><i class="fas fa-print"></i>Cetak</button>';$('mPrintBtn').classList.remove('hidden')}else $('mPrintBtn').classList.add('hidden');$('mOv').classList.remove('hidden');$('mOv').classList.add('flex');document.body.style.overflow='hidden'}

const _ssCb={};
function ssHTML(id,opts,selected,placeholder){placeholder=placeholder||'-- Pilih --';const selOpt=opts.find(o=>o.value===selected&&!o.hidden);const dt=selOpt?selOpt.label:placeholder;const isPh=!selOpt;let h='<div class="ss-wrap" id="ss-'+id+'"><div class="ss-trigger" onclick="ssToggle(\''+id+'\')"><span class="ss-display'+(isPh?' ph':'')+'">'+esc(dt)+'</span><i class="fas fa-chevron-down ss-arrow"></i></div><div class="ss-panel" id="ssp-'+id+'"><div class="ss-search"><i class="fas fa-search"></i><input type="text" placeholder="Ketik untuk mencari..." oninput="ssFilter(\''+id+'\',this.value)" onkeydown="ssKeyNav(event,\''+id+'\')"></div><div class="ss-list" id="ssl-'+id+'">';opts.forEach(o=>{if(o.hidden)return;const cls=(o.value===selected?' active':'')+(o.special?' special':'');h+='<div class="ss-opt'+cls+'" data-val="'+esc(o.value)+'" onmousedown="ssPick(\''+id+'\',this.dataset.val)"><span class="ss-ol">'+esc(o.label)+'</span>';if(o.extra)h+='<span class="ss-oe">'+esc(o.extra)+'</span>';h+='</div>'});h+='</div></div></div>';return h}
function ssInit(id,cb){_ssCb[id]=cb}
function ssToggle(id){ssCloseAll(id);const panel=$('ssp-'+id),wrap=$('ss-'+id);if(!panel||!wrap)return;const trigger=wrap.querySelector('.ss-trigger');const isOpen=panel.classList.contains('show');if(isOpen){panel.classList.remove('show');trigger?.classList.remove('open')}else{panel.classList.add('show');trigger?.classList.add('open');ssPosition(id);const inp=panel.querySelector('.ss-search input');if(inp){inp.value='';ssFilter(id,'');setTimeout(()=>inp.focus(),60)}}}
function ssPosition(id){const trigger=document.querySelector('#ss-'+id+' .ss-trigger'),panel=$('ssp-'+id);if(!trigger||!panel)return;const r=trigger.getBoundingClientRect(),vw=window.innerWidth;let w=r.width;if(w<200)w=200;let left=r.left;if(left+w>vw-8)left=vw-w-8;if(left<8)left=8;panel.style.top=(r.bottom+4)+'px';panel.style.left=left+'px';panel.style.width=w+'px'}
function ssCloseAll(exceptId){document.querySelectorAll('.ss-panel.show').forEach(p=>{const id=p.id.replace('ssp-','');if(id!==exceptId){p.classList.remove('show');const wrap=$('ss-'+id);wrap?.querySelector('.ss-trigger')?.classList.remove('open')}})}
function ssFilter(id,q){const list=$('ssl-'+id);if(!list)return;q=q.toLowerCase();const opts=list.querySelectorAll('.ss-opt');let vis=0;opts.forEach(o=>{const label=o.querySelector('.ss-ol')?.textContent?.toLowerCase()||'',extra=o.querySelector('.ss-oe')?.textContent?.toLowerCase()||'';const match=!q||label.includes(q)||extra.includes(q);o.style.display=match?'':'none';if(match)vis++});let nr=list.querySelector('.ss-nores');if(vis===0){if(!nr){nr=document.createElement('div');nr.className='ss-nores';nr.innerHTML='<i class="fas fa-search"></i>Tidak ditemukan';list.appendChild(nr)}nr.style.display=''}else if(nr)nr.style.display='none'}
function ssKeyNav(e,id){if(e.key==='Escape'){ssCloseAll();e.preventDefault()}else if(e.key==='ArrowDown'||e.key==='ArrowUp'){e.preventDefault();const list=$('ssl-'+id);if(!list)return;const vis=[...list.querySelectorAll('.ss-opt')].filter(o=>o.style.display!=='none');if(!vis.length)return;const cur=list.querySelector('.ss-opt.hover');if(cur)cur.classList.remove('hover');let idx=-1;if(cur)idx=vis.indexOf(cur);if(e.key==='ArrowDown')idx=Math.min(idx+1,vis.length-1);else idx=Math.max(idx-1,0);vis[idx]?.classList.add('hover');vis[idx]?.scrollIntoView({block:'nearest'})}else if(e.key==='Enter'){e.preventDefault();const hov=$('ssl-'+id)?.querySelector('.ss-opt.hover');if(hov)ssPick(id,hov.dataset.val)}}
function ssPick(id,val){const wrap=$('ss-'+id),panel=$('ssp-'+id),list=$('ssl-'+id);if(!wrap||!panel||!list)return;list.querySelectorAll('.ss-opt').forEach(o=>{o.classList.toggle('active',o.dataset.val===val);o.classList.remove('hover')});const act=list.querySelector('.ss-opt.active'),disp=wrap.querySelector('.ss-display');if(act&&disp){disp.textContent=act.querySelector('.ss-ol')?.textContent||'';disp.classList.remove('ph')}else if(!val&&disp){disp.textContent='-- Pilih --';disp.classList.add('ph')}panel.classList.remove('show');wrap.querySelector('.ss-trigger')?.classList.remove('open');if(_ssCb[id])_ssCb[id](val)}
function ssVal(id){return $('ssl-'+id)?.querySelector('.ss-opt.active')?.dataset.val||''}
document.addEventListener('mousedown',e=>{if(!e.target.closest('.ss-wrap'))ssCloseAll()});

function pagHTML(cp,total,ps,pv,uf){const tp=Math.ceil(total/ps);if(!total)return'';if(tp<=1)return'<div class="px-4 py-2 border-t border-cool-200 text-[11px] text-gray-400">Menampilkan '+total+' data</div>';const s2=(cp-1)*ps+1,e=Math.min(cp*ps,total);let h='<div class="px-4 py-2.5 border-t border-cool-200 flex flex-col sm:flex-row items-center justify-between gap-2"><span class="text-[11px] text-gray-400">Menampilkan '+s2+'–'+e+' dari '+total+'</span><div class="flex items-center gap-2"><select onchange="'+pv+'PS=Number(this.value);'+pv+'P=1;'+uf+'()" class="px-2 py-1 rounded-md border border-cool-200 text-[11px] bg-white cursor-pointer font-medium">';[20,30,50,100].forEach(v=>{h+='<option value="'+v+'"'+(v===ps?' selected':'')+'>'+v+' / hal</option>'});h+='</select><div class="flex items-center gap-0.5"><button class="pag-btn bg-cool-100 text-gray-500" onclick="'+pv+'P=1;'+uf+'()" '+(cp<=1?'disabled':'')+'><i class="fas fa-angle-double-left" style="font-size:9px"></i></button><button class="pag-btn bg-cool-100 text-gray-500" onclick="'+pv+'P='+(cp-1)+';'+uf+'()" '+(cp<=1?'disabled':'')+'><i class="fas fa-angle-left" style="font-size:9px"></i></button>';let sp=Math.max(1,cp-2),ep=Math.min(tp,sp+4);if(ep-sp<4)sp=Math.max(1,ep-4);if(sp>1)h+='<span class="pag-dots">…</span>';for(let p=sp;p<=ep;p++)h+=p===cp?'<button class="pag-btn active">'+p+'</button>':'<button class="pag-btn bg-cool-100 text-gray-600" onclick="'+pv+'P='+p+';'+uf+'()">'+p+'</button>';if(ep<tp)h+='<span class="pag-dots">…</span>';h+='<button class="pag-btn bg-cool-100 text-gray-500" onclick="'+pv+'P='+(cp+1)+';'+uf+'()" '+(cp>=tp?'disabled':'')+'><i class="fas fa-angle-right" style="font-size:9px"></i></button><button class="pag-btn bg-cool-100 text-gray-500" onclick="'+pv+'P='+tp+';'+uf+'()" '+(cp>=tp?'disabled':'')+'><i class="fas fa-angle-double-right" style="font-size:9px"></i></button>';h+='</div></div></div>';return h}

+'\';mP=1;updMitraList()" class="px-2.5 py-1.5 rounded-lg text-xs font-medium transition '+(mFilterJenis===f?'flt-active':'bg-cool-100 text-gray-600 hover:bg-cool-200')+'">'+lb[f]+'</button>'}).join('')+'</div></div><div class="flex gap-1.5 flex-wrap items-center"><span class="text-[10px] text-gray-400 font-medium uppercase tracking-wider mr-0.5">Filter:</span>'+['all','custom'].map(f=>{const lb={all:'Semua',custom:'Tgl Custom'};return'<button data-mfilter="'+f+'" onclick="mFilter=\''+f+'\';mP=1;updMitraList()" class="px-2.5 py-1.5 rounded-md text-xs font-medium transition '+(mFilter===f?'bg-navy-900 text-white':'bg-cool-100 text-gray-600 hover:bg-cool-200')+'">'+lb[f]+'</button>'}).join('')+'</div></div><div id="mitraListWrap"></div></div></div>'}
function updMitraList(){const el=$('mitraListWrap');if(!el)return;const dupSet=new Set(findDuplicates().map(d=>d.nomor));let list=[...S.mitra];if(mFilterJenis!=='all')list=list.filter(m=>m.jenisPetugas===mFilterJenis);if(mFilter==='custom')list=list.filter(m=>m.tglTandaTangan);if(mSearch){const q=mSearch.toLowerCase();list=list.filter(m=>m.nama.toLowerCase().includes(q)||m.nik.includes(q)||m.nomorKontrak.toLowerCase().includes(q))}list.sort((a,b)=>(b.nomorKontrak||'').localeCompare(a.nomorKontrak||''));const tf=list.length;if(!tf){el.innerHTML='<div class="px-6 py-16 text-center text-gray-400"><i class="fas fa-inbox text-3xl mb-3 block"></i>Belum ada kontrak.</div>';return}const st=(mP-1)*mPS,en=Math.min(mP*mPS,tf),pi=list.slice(st,en);const cbCol=_selMode?'<th class="w-9 text-center" style="padding:9px 4px"><input type="checkbox" id="selHdrCb" onchange="this.checked?selAllVisible():deselAll()" class="sel-cb"></th>':'';const selQ=_selMode&&!_selMitra.size?'<div class="px-4 py-1.5 bg-blue-50 border-b border-blue-100 text-[11px] text-blue-700 flex items-center gap-2"><i class="fas fa-info-circle"></i>Centang yang ingin dicetak, atau <button onclick="selAllVisible()" class="underline font-semibold hover:no-underline">pilih semua ('+tf+')</button></div>':'';el.innerHTML=selQ+'<div class="tbl-scroll"><table class="w-full ctbl"><thead><tr class="text-center">'+cbCol+'<th class="w-7">No</th><th style="width:185px">Nomor</th><th>Nama</th><th class="text-center">Jenis</th><th class="text-center">TTD</th><th class="text-center">Honor</th><th class="text-center w-28">Aksi</th></tr></thead><tbody>'+pi.map((m,i)=>{const isDup=dupSet.has(m.nomorKontrak),isSel=_selMitra.has(m.id);const cbTd=_selMode?'<td class="text-center" style="padding:2px 4px"><input type="checkbox" data-mid-cb="'+m.id+'" '+(isSel?'checked':'')+' onchange="toggleSel(\''+m.id+'\',this.checked)" class="sel-cb"></td>':'';const jC=m.jenisPetugas==='PML'?'<span class="jenis-chip pml"><i class="fas fa-building" style="font-size:7px"></i>PML</span>':'<span class="jenis-chip ppl"><i class="fas fa-walking" style="font-size:7px"></i>PPL</span>';return'<tr class="tbl-row border-b border-cool-100 last:border-0 '+(isDup?'bg-red-50/50':'')+' '+(isSel?'row-sel':'')+'" data-mid="'+m.id+'">'+cbTd+'<td class="text-[11px]">'+(st+i+1)+'</td><td>'+formatNomorBadge(m.nomorKontrak,isDup)+'</td><td class="font-medium">'+esc(m.nama)+'</td><td class="text-center">'+jC+'</td><td class="text-center">'+(m.tglTandaTangan?'<span class="date-badge custom"><i class="fas fa-lock" style="font-size:7px"></i>'+fTglShort(m.tglTandaTangan)+'</span>':'<span class="date-badge global">'+fTglShort(S.set.tglTandaTangan||'')+'</span>')+'</td><td class="font-mono text-[11px] text-right">'+Number(m.totalHonor||0).toLocaleString('id-ID')+'</td><td class="text-right whitespace-nowrap"><button onclick="viewM(\''+m.id+'\')" class="text-blue-500 hover:text-blue-600 text-xs font-medium mr-1"><i class="fas fa-eye"></i></button><button onclick="editM(\''+m.id+'\')" class="text-amber-400 hover:text-amber-500 text-xs font-medium mr-1"><i class="fas fa-pen"></i></button><button onclick="printK(\''+m.id+'\')" class="text-blue-500 hover:text-blue-600 text-xs font-medium mr-1"><i class="fas fa-print"></i></button><button onclick="delM(\''+m.id+'\')" class="text-red-400 hover:text-red-500 text-xs font-medium"><i class="fas fa-trash"></i></button></td></tr>'}).join('')+'</tbody></table></div>'+pagHTML(mP,tf,mPS,'m','updMitraList');document.querySelectorAll('[data-mfilter]').forEach(btn=>{btn.className='px-2.5 py-1.5 rounded-md text-xs font-medium transition '+(btn.dataset.mfilter===mFilter?'bg-navy-900 text-white':'bg-cool-100 text-gray-600 hover:bg-cool-200')});document.querySelectorAll('[data-mfilter-jenis]').forEach(btn=>{btn.className='px-2.5 py-1.5 rounded-lg text-xs font-medium transition '+(btn.dataset.mfilterJenis===mFilterJenis?'flt-active':'bg-cool-100 text-gray-600 hover:bg-cool-200')});const stb=$('selToggleBtn');if(stb) iv><div class="f-row f-row-2" style="margin-bottom:8px"><div class="fg"><label class="fg-label">Nilai Termin I — Baris 1 Kolom 6 (Rp)</label><input id="fNilaiT1" type="number" value="'+(m.nilaiTermin1||'')+'" min="0" class="fg-input font-mono" oninput="updNilaiTerbilang();updNilaiMatch()" placeholder="Contoh: 600000"><div id="nilaiT1Terbilang" class="text-xs text-gray-500 mt-1 font-medium italic">'+(m.nilaiTermin1?terbilang(m.nilaiTermin1)+' rupiah':'')+'</div></div><div class="fg"><label class="fg-label">Nilai Termin II — Baris 3 Kolom 6 (Rp)</label><input id="fNilaiT2" type="number" value="'+(m.nilaiTermin2||'')+'" min="0" class="fg-input font-mono" oninput="updNilaiTerbilang();updNilaiMatch()" placeholder="Contoh: 900000"><div id="nilaiT2Terbilang" class="text-xs text-gray-500 mt-1 font-medium italic">'+(m.nilaiTermin2?terbilang(m.nilaiTermin2)+' rupiah':'')+'</div></div></div><div id="nilaiSumBox"></div></div></div>'+'<div class="f-section"><div class="f-section-hd"><i class="fas fa-sticky-note shd-blue"></i>Catatan</div><div class="f-section-bd"><textarea id="fCatatan" rows="2" class="fg-input" style="resize:none" placeholder="Opsional...">'+esc(m.catatan||'')+'</textarea></div></div>'+'<div class="flex justify-between pt-2" style="margin-top:4px"><button onclick="cM()" class="btn-g px-5 py-2.5 rounded-xl text-sm font-medium"><i class="fas fa-arrow-left mr-1.5"></i>Batal</button><button onclick="saveMitra(\''+(m.id||'')+'\')" class="btn-p px-6 py-2.5 rounded-xl text-sm font-semibold"><i class="fas fa-save mr-1.5"></i>'+(isEdit?'Simpan Perubahan':'Simpan Kontrak')+'</button></div></div>'}
